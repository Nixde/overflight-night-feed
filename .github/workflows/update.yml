name: Update Night Feed

on:
  # Run daily at 3 AM UTC
  schedule:
    - cron: '0 3 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
  
  # Run on push to main (but not for commits from the bot)
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/update.yml'

jobs:
  update-feed:
    runs-on: ubuntu-latest
    
    # Prevent infinite loops - skip if commit is from the bot
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[bot]')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version
      
      - name: Generate night.json
        run: python scripts/build_night_json.py --write-report
        env:
          PYTHONUNBUFFERED: 1
      
      - name: Check for changes
        id: check_changes
        run: |
          git diff --exit-code night.json || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add night.json
          git add reports/analysis_report.* || true
          git commit -m "[bot] Update night.json - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload analysis report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-report
          path: reports/
          retention-days: 30
      
      - name: Summary
        if: always()
        run: |
          echo "## Night Feed Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f night.json ]; then
            ITEM_COUNT=$(jq '. | length' night.json)
            echo "✅ Generated \`night.json\` with **$ITEM_COUNT** items" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Failed to generate \`night.json\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/analysis_report.json ]; then
            echo "📊 Analysis report available in artifacts" >> $GITHUB_STEP_SUMMARY
          fi
